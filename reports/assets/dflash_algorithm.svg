<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="520" viewBox="0 0 1120 520">
  <defs>
    <style>
      .bg { fill: #fff; }
      .box { fill: #f7f7f7; stroke: #d6d6d6; stroke-width: 2; rx: 18; }
      .redbox { fill: #fff1f1; stroke: #c7000b; stroke-width: 2.5; rx: 18; }
      .dark { fill: #222; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", sans-serif; font-size: 24px; font-weight: 650; }
      .text { fill: #555; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", sans-serif; font-size: 19px; }
      .small { fill: #666; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", sans-serif; font-size: 16px; }
      .red { fill: #c7000b; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", sans-serif; font-size: 20px; font-weight: 700; }
      .arrow { stroke: #c7000b; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .thin { stroke: #999; stroke-width: 2; fill: none; marker-end: url(#arrowGray); }
      .token { fill: #fff; stroke: #c7000b; stroke-width: 2; rx: 9; }
      .ok { fill: #e9f7ef; stroke: #1f8a4c; stroke-width: 2; rx: 9; }
      .reject { fill: #f1f1f1; stroke: #aaa; stroke-width: 2; rx: 9; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#c7000b"/>
    </marker>
    <marker id="arrowGray" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#999"/>
    </marker>
  </defs>
  <rect class="bg" x="0" y="0" width="1120" height="520"/>
  <text class="dark" x="48" y="52">DFlash draft: 独立草稿模型并行提出一整块候选 token</text>
  <text class="text" x="48" y="86">适合低 draft 成本和高吞吐场景；关键是让 draft 学到多模态 verifier 的真实输出分布。</text>

  <rect class="box" x="48" y="130" width="210" height="116"/>
  <text class="dark" x="78" y="176">图文输入</text>
  <text class="small" x="78" y="208">image + prompt</text>

  <path class="arrow" d="M262 188 C300 188, 318 188, 352 188"/>
  <rect class="box" x="356" y="130" width="248" height="116"/>
  <text class="dark" x="386" y="176">Verifier 隐状态</text>
  <text class="small" x="386" y="208">主模型上下文表示</text>

  <path class="arrow" d="M608 188 C646 188, 664 188, 698 188"/>
  <rect class="redbox" x="702" y="118" width="314" height="140"/>
  <text class="dark" x="734" y="162">DFlash draft</text>
  <text class="text" x="734" y="196">一次前向并行预测 k 个 token</text>
  <text class="red" x="734" y="226">训练目标: 对齐 verifier top-1</text>

  <rect class="token" x="706" y="306" width="62" height="42"/>
  <rect class="token" x="778" y="306" width="62" height="42"/>
  <rect class="token" x="850" y="306" width="62" height="42"/>
  <rect class="token" x="922" y="306" width="62" height="42"/>
  <rect class="token" x="994" y="306" width="62" height="42"/>
  <text class="small" x="722" y="333">t+1</text>
  <text class="small" x="794" y="333">t+2</text>
  <text class="small" x="866" y="333">t+3</text>
  <text class="small" x="938" y="333">t+4</text>
  <text class="small" x="1010" y="333">t+7</text>
  <path class="thin" d="M858 260 L858 300"/>
  <text class="text" x="742" y="382">candidate block</text>

  <path class="arrow" d="M700 330 C560 330, 514 330, 442 330"/>
  <rect class="box" x="176" y="284" width="260" height="136"/>
  <text class="dark" x="210" y="330">Verifier 并行校验</text>
  <text class="small" x="210" y="362">只接受从第一个 token 开始</text>
  <text class="small" x="210" y="388">连续匹配的前缀</text>

  <rect class="ok" x="494" y="404" width="72" height="42"/>
  <rect class="ok" x="576" y="404" width="72" height="42"/>
  <rect class="reject" x="658" y="404" width="72" height="42"/>
  <text class="small" x="515" y="431">接收</text>
  <text class="small" x="597" y="431">接收</text>
  <text class="small" x="679" y="431">停止</text>
  <text class="red" x="780" y="430">mean accept/draft 越高，吞吐越高</text>
</svg>
